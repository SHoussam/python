<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Connexion — StageLink</title>
  <style>:root{
    --bg:#f3f7fb;
    --panel:rgba(255,255,255,.88);
    --primary:#0f766e;
    --primary2:#14b8a6;
    --primary-dark:#0d5f58;
    --text:#0f172a;
    --muted:#64748b;
    --danger:#dc2626;
    --shadow:0 14px 40px rgba(15,23,42,.08);
    --shadow-hover:0 18px 50px rgba(15,23,42,.14);
    --radius-xl:22px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    background:
        radial-gradient(circle at top left, rgba(20,184,166,.12), transparent 28%),
        radial-gradient(circle at top right, rgba(15,118,110,.10), transparent 26%),
        var(--bg);
}

.card{
    width:100%;
    max-width:450px;
    background:var(--panel);
    backdrop-filter:blur(10px);
    border-radius:var(--radius-xl);
    overflow:hidden;
    box-shadow:var(--shadow);
    transition:.25s;
}

.card:hover{
    transform:translateY(-3px);
    box-shadow:var(--shadow-hover);
}

.header{
    background:linear-gradient(135deg,var(--primary),var(--primary2));
    color:white;
    padding:30px;
    text-align:center;
}

.header h2{
    margin-bottom:8px;
    font-size:30px;
}

.header p{
    opacity:.9;
}

.content{
    padding:30px;
}

.field{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#334155;
    font-weight:600;
}

input{
    width:100%;
    padding:13px 15px;
    border:1px solid #cbd5e1;
    border-radius:12px;
    font-size:15px;
    transition:.2s;
}

input:focus{
    outline:none;
    border-color:#14b8a6;
    box-shadow:0 0 0 4px rgba(20,184,166,.12);
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:var(--primary);
    color:white;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    background:var(--primary-dark);
    transform:translateY(-2px);
}

.error{
    background:#fef2f2;
    border:1px solid #fecaca;
    color:var(--danger);
    padding:12px;
    border-radius:12px;
    margin-bottom:18px;
}

.register-link{
    text-align:center;
    margin-top:20px;
    color:var(--muted);
}

.register-link a{
    color:var(--primary);
    text-decoration:none;
    font-weight:700;
}

.register-link a:hover{
    text-decoration:underline;
}</style>
</head>
<body>
 <div class="card">

    <div class="header">
        <h2>StageLink</h2>
        <p>Connectez-vous à votre compte</p>
    </div>

    <div class="content">

        {% if error %}
        <div class="error">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="{% url 'webterminal:login_submit' %}">
            {% csrf_token %}

            <div class="field">
                <label>Email</label>
                <input type="email"
                       name="email"
                       placeholder="exemple@email.com"
                       required>
            </div>

            <div class="field">
                <label>Mot de passe</label>
                <input type="password"
                       name="password"
                       placeholder="••••••••"
                       required>
            </div>

            <button type="submit">
                Se connecter
            </button>

        </form>

        <div class="register-link">
            Pas encore de compte ?
            <a href="{% url 'webterminal:register' %}">
                S'inscrire
            </a>
        </div>

    </div>

</div>
</body>
</html>
