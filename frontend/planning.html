<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StageLink — Planning</title>
  <link rel="stylesheet" href="css/style.css?v=4" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <div class="page-head">
        <div>
          <h1>Planning</h1>
          <p id="sub">Your weekly calendar.</p>
        </div>
        <a class="btn inline" href="create-event.html">+ New event</a>
      </div>

      <div class="cal-toolbar">
        <div class="cal-nav">
          <button class="btn secondary sm" id="prev" title="Previous week">‹</button>
          <button class="btn secondary sm" id="today">Today</button>
          <button class="btn secondary sm" id="next" title="Next week">›</button>
        </div>
        <div class="week-label" id="weekLabel"></div>
        <div class="cal-legend">08:00–19:00 · click an event to edit</div>
      </div>

      <div class="alert" id="alert"></div>
      <div id="calWrap"><div class="spinner"></div></div>
    </main>
  </div>

  <script src="js/api.js?v=4"></script>
  <script>
    const DAYS = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
    const HOURS = Array.from({ length: 12 }, (_, i) => 8 + i); // 8h → 19h
    const HOUR_H = 48; // px per hour (matches .cal-slot / .cal-hour height)
    const PALETTE = [
      { bg: "#15803d", fg: "#ffffff" },
      { bg: "#0d9488", fg: "#ffffff" },
      { bg: "#ca8a04", fg: "#ffffff" },
      { bg: "#4d7c0f", fg: "#ffffff" },
      { bg: "#f5c518", fg: "#14271a" },
    ];

    let weekStart = startOfWeek(new Date());
    let EVENTS = [];
    let ME = null;

    function startOfWeek(d) {
      const nd = new Date(d);
      nd.setHours(0, 0, 0, 0);
      const dow = (nd.getDay() + 6) % 7; // Monday = 0
      nd.setDate(nd.getDate() - dow);
      return nd;
    }
    function addDays(d, n) { const nd = new Date(d); nd.setDate(nd.getDate() + n); return nd; }
    function sameDay(a, b) {
      return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    }
    function fmtDay(d) { return d.toLocaleDateString(undefined, { day: "2-digit", month: "short" }); }
    function fmtTime(d) { return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }); }

    (async function () {
      try {
        ME = await requireAuth();
        if (!ME) return;
        renderSidebar(ME, "planning");
        const subMap = {
          student: "Your personal, group and team events.",
          school: "Events you created for your groups.",
          company: "Events you created for your teams.",
        };
        document.getElementById("sub").textContent = subMap[ME.role] || "";
        const data = await api.events();
        EVENTS = (data.events || []).filter((e) => e.start_date && e.end_date);
        render();
      } catch (err) {
        document.getElementById("calWrap").innerHTML = "";
        showAlert(document.getElementById("alert"), "error",
          (err && err.message) || "Could not load your planning. Is the server running?");
      }
    })();

    document.getElementById("prev").addEventListener("click", () => { weekStart = addDays(weekStart, -7); render(); });
    document.getElementById("next").addEventListener("click", () => { weekStart = addDays(weekStart, 7); render(); });
    document.getElementById("today").addEventListener("click", () => { weekStart = startOfWeek(new Date()); render(); });

    function render() {
      const days = Array.from({ length: 7 }, (_, i) => addDays(weekStart, i));
      document.getElementById("weekLabel").textContent = "Week of " + fmtDay(days[0]) + " — " + fmtDay(days[6]);

      let head = '<div class="cal-corner"></div>';
      days.forEach((d, i) => {
        head += `<div class="cal-dayhead ${sameDay(d, new Date()) ? "today" : ""}"><div class="dow">${DAYS[i]}</div><div class="dom">${d.getDate()}</div></div>`;
      });

      const gutter = '<div class="cal-gutter">' + HOURS.map((h) => `<div class="cal-hour">${h}:00</div>`).join("") + "</div>";

      let cols = "";
      days.forEach((d) => {
        const slots = HOURS.map(() => '<div class="cal-slot"></div>').join("");
        const evs = EVENTS.filter((e) => sameDay(new Date(e.start_date), d)).map(eventHtml).join("");
        cols += `<div class="cal-day ${sameDay(d, new Date()) ? "today" : ""}">${slots}${evs}</div>`;
      });

      document.getElementById("calWrap").innerHTML =
        `<div class="cal"><div class="cal-scroll"><div class="cal-inner">` +
        `<div class="cal-head">${head}</div>` +
        `<div class="cal-grid">${gutter}${cols}</div>` +
        `</div></div></div>`;

      document.querySelectorAll(".cal-event").forEach((el) => {
        el.addEventListener("click", () => {
          const e = EVENTS.find((x) => String(x.id) === el.dataset.id);
          if (e) openEvent(e);
        });
      });
    }

    function eventHtml(e) {
      const s = new Date(e.start_date), en = new Date(e.end_date);
      const startH = s.getHours() + s.getMinutes() / 60;
      const endH = en.getHours() + en.getMinutes() / 60;
      const top = Math.max(0, startH - HOURS[0]) * HOUR_H;
      const height = Math.max(22, (endH - startH) * HOUR_H);
      const c = PALETTE[e.id % PALETTE.length];
      return `<div class="cal-event" data-id="${e.id}" title="${esc(e.title)}${e.description ? " — " + esc(e.description) : ""}"` +
        ` style="top:${top}px;height:${height}px;background:${c.bg};color:${c.fg}">` +
        `<div class="t">${esc(e.title)}</div>` +
        `<div class="time">${fmtTime(s)} – ${fmtTime(en)}</div>` +
        `</div>`;
    }

    function openEvent(e) {
      const p = new URLSearchParams({
        id: e.id,
        title: e.title || "",
        start: e.start_date || "",
        end: e.end_date || "",
        desc: e.description || "",
      });
      window.location.href = "edit-event.html?" + p.toString();
    }
    </script>
  </body>
</html>
